name: CI Pipeline for LogScope
on:
  push:
    branches:
      - "main"
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/**"
  pull_request:
    branches:
      - "main"

jobs:
  # ── Stage 1: Frontend Code Validation ───────────────────────────────────────
  frontend-test-and-scan:
    name: Frontend Test & Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Validate static code (Test Build)
        run: npm run build

      - name: Run Trivy SAST scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./frontend"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"
  # ── Stage 1: Backend Code Validation ───────────────────────────────────────
  backend-test-and-scan:
    name: Backend Test & Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          # Fails the pipeline if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treats all other formatting issues as warnings (does not fail the pipeline)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Validate static code (Syntax Check)
        run: python -m compileall .

      - name: Run Trivy SAST scanner (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./backend"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"
