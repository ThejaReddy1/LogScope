name: CI Pipeline for LogScope
on:
  push:
    branches:
      - "main"
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/**"
  pull_request:
    branches:
      - "main"

jobs:
  # ── Stage 1: Frontend Code Validation ───────────────────────────────────────
  frontend-test-and-scan:
    name: Frontend Test & Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install dependencies
        run: mpm ci

      - name: Run tests
        run: npm test

      - name: Run Trivy SAST scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./frontend"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"
