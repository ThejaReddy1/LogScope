name: CI Pipeline for LogScope
on:
  push:
    branches:
      - "main"
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/**"

jobs:
  test-and-scan-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: mpm ci

      - name: Run tests
        run: npm test

      - name: Run Trivy SAST scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./frontend"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"
